<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HarishCodes | Digital Career Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-blur"></div>

    <header>
        <nav>
            <div class="logo">HARISH<span>//HUB</span></div>
            <div class="nav-tabs">
                <button onclick="loadSection('jobs')" class="t-btn active">Job Leads</button>
                <button onclick="loadSection('roadmaps')" class="t-btn">Roadmaps</button>
                <button onclick="loadSection('prep')" class="t-btn">Interview Prep</button>
            </div>
            <a href="admin.html" class="admin-link">Dashboard</a>
        </nav>
    </header>

    <main id="main-content">
        <section class="hero">
            <span class="status-dot"></span> LIVE FOR 2026 BATCH
            <h1 id="page-title">Off-Campus <span>Job Leads</span></h1>
            <p id="page-desc">Curated engineering roles for freshers, updated manually daily.</p>
        </section>

        <div id="feed-container" class="grid-feed">
            <div class="loading">Booting Hub...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


     const firebaseConfig = {
  apiKey: "AIzaSyCaeOpiB8z_jJ8m3gmfBiREJyqt2PaqdLQ",
  authDomain: "libr-68752.firebaseapp.com",
  databaseURL: "https://libr-68752.firebaseio.com",
  projectId: "libr-68752",
  storageBucket: "libr-68752.firebasestorage.app",
  messagingSenderId: "395424150999",
  appId: "1:395424150999:web:d874350d01ae5c90a8c792",
  measurementId: "G-583EWMYB0V"
};
            
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.loadSection = (type) => {
            // Update UI
            document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            const title = document.getElementById('page-title');
            const desc = document.getElementById('page-desc');

            if(type === 'jobs') {
                title.innerHTML = "Off-Campus <span>Job Leads</span>";
                desc.innerText = "The best entry-level roles from LinkedIn and Twitter, filtered for you.";
            } else if(type === 'roadmaps') {
                title.innerHTML = "Modern <span>Roadmaps</span>";
                desc.innerText = "Step-by-step guides for AI, Android, and Full-Stack in 2026.";
            } else {
                title.innerHTML = "Interview <span>Vault</span>";
                desc.innerText = "Daily technical questions and code snippets to crack your next round.";
            }

            // Real-time Fetch
            const q = query(collection(db, type), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('feed-container');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const data = doc.data();
                    container.innerHTML += type === 'jobs' ? renderJob(data) : 
                                           type === 'roadmaps' ? renderRoadmap(data) : renderPrep(data);
                });
            });
        };

        const renderJob = (d) => `
            <div class="card job-card">
                <div class="badge">FRESHER</div>
                <h3>${d.title} @ ${d.company}</h3>
                <p>Batch: ${d.batch}</p>
                <div class="card-footer">
                    <span>${d.date}</span>
                    <a href="${d.url}" target="_blank" class="btn-p">Apply</a>
                </div>
            </div>`;

        const renderRoadmap = (d) => `
            <div class="card rm-card">
                <h3>${d.title}</h3>
                <p>${d.desc}</p>
                <ul class="steps">${d.steps.split(',').map(s => `<li>${s.trim()}</li>`).join('')}</ul>
                <a href="${d.link}" class="btn-s">View Path</a>
            </div>`;

        const renderPrep = (d) => `
            <div class="card prep-card">
                <div class="badge prep">INTERVIEW</div>
                <h3>${d.question}</h3>
                <div class="code-box"><code>${d.code}</code></div>
                <p>${d.answer}</p>
            </div>`;

        // Initial Load
        loadSection('jobs');
    </script>
</body>
</html>
