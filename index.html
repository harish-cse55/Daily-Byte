<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HarishCodes | Career Success Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-gradient"></div>

    <header>
        <nav>
            <div class="logo">HARISH<span>//HUB</span></div>
            <div class="nav-links">
                <button onclick="filterContent('jobs')" class="nav-btn active">Jobs</button>
                <button onclick="filterContent('roadmaps')" class="nav-btn">Roadmaps</button>
                <button onclick="filterContent('prep')" class="nav-btn">Interview Prep</button>
                <a href="admin.html" class="admin-icon">⚙️</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="hero">
            <div id="hero-tag" class="badge">SYSTEM READY</div>
            <h1 id="hero-title">Your Bridge to <span>Industry.</span></h1>
            <p id="hero-desc">Curated job leads, Gen-AI roadmaps, and interview hacks for modern freshers.</p>
        </section>

        <section id="main-feed" class="content-grid">
            <div class="loader">Initialising Database...</div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            // PASTE YOUR FIREBASE CONFIG HERE
            apiKey: "...",
            authDomain: "harishcodes-in.firebaseapp.com",
            projectId: "harishcodes-in",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const feed = document.getElementById('main-feed');

        // Main Fetch Logic
        window.filterContent = (type) => {
            // Update UI buttons
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            const q = query(collection(db, type), orderBy("timestamp", "desc"));
            
            onSnapshot(q, (snapshot) => {
                feed.innerHTML = "";
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if(type === 'jobs') feed.innerHTML += renderJobCard(data);
                    else if(type === 'roadmaps') feed.innerHTML += renderRoadmapCard(data);
                    else feed.innerHTML += renderPrepCard(data);
                });
            });
        };

        function renderJobCard(d) {
            return `
                <div class="glass-card job-anim">
                    <div class="card-tag">OFF-CAMPUS</div>
                    <h3>${d.title}</h3>
                    <p class="company">${d.company} • ${d.batch}</p>
                    <div class="card-footer">
                        <span>Posted ${d.date}</span>
                        <a href="${d.url}" target="_blank" class="apply-btn">Apply Now</a>
                    </div>
                </div>`;
        }

        function renderRoadmapCard(d) {
            return `
                <div class="glass-card roadmap-anim">
                    <div class="card-tag roadmap">ROADMAP</div>
                    <h3>${d.title}</h3>
                    <p>${d.description}</p>
                    <ul class="steps">${d.steps.map(s => `<li>${s}</li>`).join('')}</ul>
                    <a href="${d.fullPath}" class="view-link">View Full Path →</a>
                </div>`;
        }

        // Initial Load
        filterContent('jobs');
    </script>
</body>
</html>
