<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- FIXED CONFIG ---
            const firebaseConfig = {
  apiKey: "AIzaSyCaeOpiB8z_jJ8m3gmfBiREJyqt2PaqdLQ",
  authDomain: "libr-68752.firebaseapp.com",
  databaseURL: "https://libr-68752.firebaseio.com",
  projectId: "libr-68752",
  storageBucket: "libr-68752.firebasestorage.app",
  messagingSenderId: "395424150999",
  appId: "1:395424150999:web:d874350d01ae5c90a8c792",
  measurementId: "G-583EWMYB0V"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Auth Logic ---
        window.login = async () => {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;

            console.log("Attempting login for:", email);

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                console.log("Success!", userCredential.user);
            } catch (error) {
                console.error("Login failed:", error.code, error.message);
                alert("Error: " + error.message);
            }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const loginOverlay = document.getElementById('login-overlay');
            const dashboard = document.getElementById('dashboard');
            if (user) {
                loginOverlay.style.display = 'none';
                dashboard.style.display = 'block';
            } else {
                loginOverlay.style.display = 'flex';
                dashboard.style.display = 'none';
            }
        });

        // --- Data Push Logic ---
        document.getElementById('job-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "Broadcasting...";

            try {
                await addDoc(collection(db, "jobs"), {
                    title: document.getElementById('jobTitle').value,
                    company: document.getElementById('jobCompany').value,
                    batch: document.getElementById('jobBatch').value,
                    url: document.getElementById('jobLink').value,
                    timestamp: serverTimestamp(),
                    date: new Date().toLocaleDateString('en-IN')
                });
                alert("Job Live!");
                e.target.reset();
            } catch (err) { 
                alert("Error: " + err.message); 
            } finally {
                btn.innerText = originalText;
            }
        });

        // --- Tab Switching (Fixed 'event' scope) ---
        window.switchTab = (tab, btn) => {
            document.querySelectorAll('.admin-form').forEach(f => f.classList.remove('active-form'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`${tab}-form`).classList.add('active-form');
            if(btn) btn.classList.add('active');
        }
    </script>
